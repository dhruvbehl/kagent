---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: remoteagents.kagent.dev
spec:
  group: kagent.dev
  names:
    categories:
    - kagent
    kind: RemoteAgent
    listKind: RemoteAgentList
    plural: remoteagents
    shortNames:
    - ras
    singular: remoteagent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.url
      name: URL
      type: string
    - jsonPath: .status.conditions[?(@.type=='Accepted')].status
      name: Accepted
      type: string
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: RemoteAgent is the Schema for the RemoteAgents API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              RemoteAgentSpec defines the desired state of RemoteAgent.

              A RemoteAgent represents an external A2A (Agent-to-Agent) protocol endpoint
              that an in-cluster Agent can reference as a sub-agent tool. This is the
              counterpart to RemoteMCPServer for A2A peers (e.g., a kagent Agent running
              in a different cluster, exposed via an agentgateway A2A frontend).
            properties:
              allowedNamespaces:
                description: |-
                  AllowedNamespaces defines which namespaces are allowed to reference this
                  RemoteAgent. This follows the Gateway API pattern for cross-namespace
                  route attachments. If not specified, only Agents in the same namespace
                  can reference this RemoteAgent.
                  See: https://gateway-api.sigs.k8s.io/guides/multiple-ns/#cross-namespace-routing
                properties:
                  from:
                    default: Same
                    description: |-
                      From indicates where references to this resource can originate.
                      Possible values are:
                      * All: References from all namespaces are allowed.
                      * Same: Only references from the same namespace are allowed (default).
                      * Selector: References from namespaces matching the selector are allowed.
                    enum:
                    - All
                    - Same
                    - Selector
                    type: string
                  selector:
                    description: |-
                      Selector is a label selector for namespaces that are allowed to reference this resource.
                      Only used when From is set to "Selector".
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
                x-kubernetes-validations:
                - message: selector must be specified when from is Selector
                  rule: '!(self.from == ''Selector'' && !has(self.selector))'
              description:
                description: |-
                  Description of the remote agent. Surfaced to the calling agent's runtime
                  alongside the URL and is useful as context in the caller's system prompt.
                type: string
              headersFrom:
                description: |-
                  HeadersFrom specifies a list of configuration values to be added as
                  headers to A2A requests sent to this remote agent. Values are resolved
                  from Secrets or ConfigMaps in the same namespace as the RemoteAgent
                  resource. Headers specified at the Tool level on the consuming Agent
                  will override any header of the same name configured here.
                items:
                  description: ValueRef represents a configuration value
                  properties:
                    name:
                      type: string
                    value:
                      type: string
                    valueFrom:
                      description: ValueSource defines a source for configuration
                        values from a Secret or ConfigMap
                      properties:
                        key:
                          description: The key of the ConfigMap or Secret.
                          type: string
                        name:
                          description: The name of the ConfigMap or Secret.
                          type: string
                        type:
                          enum:
                          - ConfigMap
                          - Secret
                          type: string
                      required:
                      - key
                      - name
                      - type
                      type: object
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: Exactly one of value or valueFrom must be specified
                    rule: (has(self.value) && !has(self.valueFrom)) || (!has(self.value)
                      && has(self.valueFrom))
                type: array
              timeout:
                description: |-
                  Timeout for A2A calls to this remote agent. If unset, the runtime's
                  default A2A client timeout is used.
                type: string
              url:
                description: |-
                  URL is the A2A endpoint of the remote agent. The remote endpoint is
                  expected to speak JSON-RPC A2A (e.g., message/send) and serve an agent
                  card at /.well-known/agent.json on the same origin.
                minLength: 1
                type: string
            required:
            - url
            type: object
          status:
            description: RemoteAgentStatus defines the observed state of RemoteAgent.
            properties:
              agentCard:
                description: AgentCard contains the fetched agent card JSON from the
                  remote endpoint.
                type: string
              agentDescription:
                description: AgentDescription is the description extracted from the
                  agent card.
                type: string
              agentName:
                description: AgentName is the name extracted from the agent card.
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                format: int64
                type: integer
            required:
            - conditions
            - observedGeneration
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
